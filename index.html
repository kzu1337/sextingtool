    <script>
        let messages = {};

        fetch('messages.txt')
            .then(response => response.text())
            .then(text => {
                let lines = text.split('\n');
                        let currentSection = '';
        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('Sexting -')) {
                currentSection = line.split(' ')[2].toLowerCase();
                if (!messages[currentSection]) messages[currentSection] = [];
            } else if (line) {
                messages[currentSection].push(line);
            }
        });
        console.log('Messages loaded:', messages); // Log the loaded messages for debugging
    })
    .catch(error => console.error('Error loading messages:', error));

function getRandomMessage(section) {
    let sectionMessages = messages[section];
    if (sectionMessages && sectionMessages.length > 0) {
        return sectionMessages[Math.floor(Math.random() * sectionMessages.length)];
    }
    return 'No messages available for section: ' + section;
}

function copyToClipboard(text) {

}
